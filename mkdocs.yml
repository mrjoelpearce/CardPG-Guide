site_name: CardPG Player Guide
site_description: Player-facing rules reference for CardPG
repo_url: https://github.com/mrjoelpearce/CardPG-Guide
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.action.edit

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - attr_list
